# azure-devops/pipelines/azure-pipelines.yml
# =============================================================
# STAGE 1: Terraform Init + Validate + Plan (Phase 1 - VPC only)
# More stages will be added as we progress phase by phase
# =============================================================

trigger:
  branches:
    include:
    - main
    - staging
    - dev
  paths:
    include:
    - 'terraform/**'
    - 'azure-devops/pipelines/**'

pr:
  branches:
    include:
    - main
    - staging
    - dev
  paths:
    include:
    - 'terraform/**'

# ─── Variable Groups ──────────────────────────────────────────────────────────

variables:
- group: databricks-aws-common
- name: TERRAFORM_DIR
  value: "terraform/environments/dev"
- name: Environment
  value: "dev"

stages:

# =============================================================
# STAGE 1 — Terraform Init
# =============================================================
- stage: TerraformInitStage
  displayName: "Terraform Init Stage"
  jobs:
  - job: InitializeTerraform
    displayName: "Initializing terraform backend"
    pool:
      name: databricks-ec2
      demands:
      - agent.name -equals databricks

    steps:
    - checkout: self
      displayName: "Checkout Github repo Code"

    - bash: |
        echo "============================================"
        terraform --version
        aws --version
        echo "============================================"
      displayName: "Check Terraform and AWS CLI versions"

    - bash: |
        cd $(Build.SourcesDirectory)/$(TERRAFORM_DIR)
        terraform init \
          -backend-config="bucket=$(TF_STATE_BUCKET)" \
          -backend-config="key=databricks/$(Environment)/terraform.tfstate" \
          -backend-config="region=$(AWS_REGION)" \
          -backend-config="encrypt=true"
      displayName: "Terraform Init"

    - bash: |
        echo "============================================"
        echo "Terraform Init completed successfully"
        echo "Bucket : $(TF_STATE_BUCKET)"
        echo "Key : databricks/$(Environment)/terraform.tfstate"
        echo "Region : $(AWS_REGION)"
        echo "============================================"
      displayName: "Terraform Init Output"

# =============================================================
# STAGE 2 — Terraform Validate
# =============================================================

- stage: TerraformValidateStage
  displayName: "Terraform Validate Stage"
  dependsOn: TerraformInitStage
  jobs:
  - job: ValidateTerraform
    displayName: "Validating terraform code"
    pool:
      name: databricks-ec2
      demands:
      - agent.name -equals databricks

    steps:
    - checkout: self
      displayName: "Checkout Github repo Code"

    - bash: |
        cd $(Build.SourcesDirectory)/$(TERRAFORM_DIR)
        terraform init \
          -backend-config="bucket=$(TF_STATE_BUCKET)" \
          -backend-config="key=databricks/$(Environment)/terraform.tfstate" \
          -backend-config="region=$(AWS_REGION)" \
          -backend-config="encrypt=true"
      displayName: "Terraform Init (for validate stage)"

    - bash: |
        cd $(Build.SourcesDirectory)/$(TERRAFORM_DIR)
        terraform validate
      displayName: "Terraform Validate"

    - bash: |
        echo "============================================"
        echo "Terraform Validate completed successfully"
        echo "All configuration files are valid"
        echo "============================================"
      displayName: "Terraform Validate Summary"

# =============================================================
# STAGE 3 — Terraform Plan
# =============================================================

- stage: TerraformPlanStage
  displayName: "Terraform Plan Stage"
  dependsOn: TerraformValidateStage
  condition: succeeded()
  jobs:
  - job: PlanTerraform
    displayName: "Planning terraform changes"
    pool:
      name: databricks-ec2
      demands:
      - agent.name -equals databricks

    steps:
    - checkout: self
      displayName: "Checkout Github repo Code"

    - bash: |
        cd $(Build.SourcesDirectory)/$(TERRAFORM_DIR)
        terraform init \
          -backend-config="bucket=$(TF_STATE_BUCKET)" \
          -backend-config="key=databricks/$(Environment)/terraform.tfstate" \
          -backend-config="region=$(AWS_REGION)" \
          -backend-config="encrypt=true"
      displayName: "Terraform Init (for plan stage)"

    - bash: |
        cd $(Build.SourcesDirectory)/$(TERRAFORM_DIR)
        terraform plan \
          -var="project_name=$(PROJECT_NAME)" \
          -var="aws_region=$(AWS_REGION)" \
          -var="owner=$(OWNER)" \
          -out=$(Build.ArtifactStagingDirectory)/tfplan-$(Environment)
      displayName: "Terraform Plan"

    - bash: |
        echo "============================================"
        echo "Terraform Plan completed successfully"
        terraform show -no-color $(Build.ArtifactStagingDirectory)/tfplan-$(Environment)
        terraform show -no-color $(Build.ArtifactStagingDirectory)/tfplan-$(Environment) > $(Build.ArtifactStagingDirectory)/tfplan-$(Environment).txt
        terraform show -json $(Build.ArtifactStagingDirectory)/tfplan-$(Environment) > $(Build.ArtifactStagingDirectory)/tfplan-$(Environment).json
        echo "============================================"
        echo "============================================"
        echo "Review the plan output above for details on proposed changes"
        echo "============================================"
        echo "Generated artifacts:"
        ls -lh $(Build.ArtifactStagingDirectory)
      displayName: "Terraform Show Output"

    - task: PublishPipelineArtifact@1
      displayName: "Publish Plan Artifact"
      inputs:
        targetPath: "$(Build.ArtifactStagingDirectory)"
        artifactName: "tfplan-$(ENVIRONMENT)"
      condition: succeeded()
